# pkgdown: build and deploy package site to GitHub Pages
# https://github.com/r-lib/actions/tree/master/examples
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.

      - name: Build pkgdown site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Verify articles were built
        run: |
          echo "Contents of docs/articles:"
          ls -la docs/articles/ || { echo "ERROR: docs/articles missing"; exit 1; }
          n=$(find docs/articles -maxdepth 1 -name '*.html' ! -name 'index.html' | wc -l)
          if [ "$n" -lt 1 ]; then
            echo "ERROR: No article HTML files built. Check that vignettes/ exists and has .Rmd files."
            exit 1
          fi
          echo "Built $n article(s)."

      # Site is published from gh-pages branch. In repo Settings → Pages, set
      # Source to "Deploy from a branch", Branch to "gh-pages", Folder to "/ (root)".
      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: true
          branch: gh-pages
          folder: docs
