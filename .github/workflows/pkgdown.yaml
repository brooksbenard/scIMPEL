# pkgdown: build and deploy package site to GitHub Pages
# https://github.com/r-lib/actions/tree/master/examples
on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::remotes, any::pkgdown, local::.
          dependency-type: hard

      - name: Ensure pkgdown >= 2.1.0
        run: |
          Rscript -e 'v <- packageVersion("pkgdown"); if (v < "2.1.0") remotes::install_github("r-lib/pkgdown", ref = "v2.1.0", upgrade = "never")'
          Rscript -e 'packageVersion("pkgdown")'

      - name: Install Suggests (including GitHub-only)
        run: |
          Rscript -e 'remotes::install_github("immunogenomics/presto", upgrade = "never")'
          Rscript -e 'remotes::install_github("barkasn/fastSave", upgrade = "never")'
          Rscript -e 'remotes::install_deps(dependencies = TRUE, upgrade = "never")'

      - name: Verify vignettes exist before build
        run: |
          echo "Package root:"
          pwd
          echo "vignettes/ contents:"
          ls -la vignettes/*.Rmd 2>/dev/null || { echo "ERROR: no .Rmd in vignettes/"; exit 1; }

      - name: Build pkgdown site
        run: |
          Rscript -e "pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)"
        env:
          PKGDOWN_DEV_MODE: release

      - name: Verify articles were built
        run: |
          echo "Contents of docs/articles:"
          ls -la docs/articles/ || { echo "ERROR: docs/articles missing"; exit 1; }
          n=$(find docs/articles -maxdepth 1 -name '*.html' ! -name 'index.html' | wc -l)
          if [ "$n" -lt 1 ]; then
            echo "ERROR: No article HTML files built. Check that vignettes/ exists and has .Rmd files."
            exit 1
          fi
          echo "Built $n article(s)."

      # Site is published from gh-pages branch. In repo Settings → Pages, set
      # Source to "Deploy from a branch", Branch to "gh-pages", Folder to "/ (root)".
      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: true
          branch: gh-pages
          folder: docs
