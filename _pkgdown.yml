url: https://brooksbenard.github.io/PhenoMapR/

development:
  mode: auto

repo:
  url:
    home: https://github.com/brooksbenard/PhenoMapR
    source: https://github.com/brooksbenard/PhenoMapR/blob/main/
    issue: https://github.com/brooksbenard/PhenoMapR/issues
  branch: main

template:
  bootswatch: simplex
  bootstrap: 5
  bslib:
    primary: "#0054AD"
    border-radius: 0.5rem
    btn-border-radius: 0.25rem

authors:
  Brooks Benard:
    href: https://profiles.stanford.edu/brooks-benard

home:
  sidebar:
    structure: [links, license, community, citation, authors, dev]
    components:
      license:
        title: License
        text: "[Stanford Non-Commercial License](https://github.com/brooksbenard/PhenoMapR/blob/main/LICENSE)"

navbar:
  title:
    text: PhenoMapR
    href: index.html
  type: default
  left:
    - text: Vignettes
      menu:
      - text: Single-cell example (GSE111672)
        href: articles/gse111672-single-cell.html
      - text: Spatial transcriptomics
        href: articles/spatial-transcriptomics.html
      - text: Bulk survival analysis (GSE205154)
        href: articles/gse205154-bulk-survival.html
      - text: Custom reference (GSE205154)
        href: articles/gse205154-custom-reference.html
    - text: R functions
      href: reference/index.html
    - text: News
      href: news/index.html

footer:
  structure:
    left: [license_text, developed_by]
    right: [pkgdown]
  components:
    license_text: "[Stanford Non-Commercial License](https://github.com/brooksbenard/PhenoMapR/blob/main/LICENSE)"

articles:
  - title: Vignettes
    desc: Tutorials and worked examples with PhenoMapR.
    contents:
      - gse111672-single-cell
      - spatial-transcriptomics
      - gse205154-bulk-survival
      - gse205154-custom-reference

reference:
- title: Prognostic scoring
  desc: Score expression data with weighted sum of prognostic gene signatures.
  contents:
  - PhenoMap
  - normalize_scores
  - add_scores_to_seurat
  - add_scores_to_sce
- title: Reference data and utilities
  desc: List cancer types, check gene coverage, get top prognostic genes, and helpers.
  contents:
  - list_cancer_types
  - get_gene_coverage
  - get_top_prognostic_genes
  - get_celltype_palette
  - cell_type_colors
  - load_rds_fast
- title: Reference datasets (internal)
  desc: Built-in reference data; use list_cancer_types() and PhenoMap() in practice.
  contents:
  - precog
  - tcga
  - pediatric
  - ici
- title: Custom reference derivation
  desc: Derive reference z-scores from bulk expression and phenotype.
  contents:
  - derive_reference_from_bulk
- title: Prognostic group analysis
  desc: Define adverse/favorable groups and find marker genes.
  contents:
  - define_prognostic_groups
  - find_prognostic_markers
- title: Visualization
  contents:
  - plot_score_distribution

news:
  releases:
  - text: "Version 0.1.0"
    href:
