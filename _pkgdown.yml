# pkgdown configuration for PhenoMapR
# https://pkgdown.r-lib.org/reference/build_site.html

template:
  bootstrap: 5
  params:
    toc: true
    toc_float: true

url: https://brooksbenard.github.io/PhenoMapR

destination: docs

development:
  mode: auto

navbar:
  structure:
    left: [reference, articles, news]
    right: [github]
  components:
    github:
      href: https://github.com/brooksbenard/PhenoMapR
      icon: fa-brands fa-github
      aria-label: View source on GitHub

footer:
  structure:
    left: [built_with]
    right: [developed_by]

articles:
  - title: Vignettes
    desc: Tutorials and worked examples
    contents:
      - gse111672-single-cell
      - gse205154-bulk-survival
      - gse205154-custom-reference

reference:
  - title: Reference
    desc: Function documentation
